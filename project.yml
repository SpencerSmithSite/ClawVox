name: ClawVox
options:
  bundleIdPrefix: com.clawvox
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  ClawVox:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ClawVox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawvox.app
        PRODUCT_NAME: ClawVox
        SWIFT_VERSION: 5.9
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: ClawVox/ClawVox.entitlements
        INFOPLIST_FILE: ClawVox/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "13.0"
    dependencies:
      - sdk: Speech.framework
      - sdk: AVFoundation.framework

  ClawVoxTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ClawVoxTests
    dependencies:
      - target: ClawVox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawvox.tests
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ClawVox:
    build:
      targets:
        ClawVox: all
        ClawVoxTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClawVoxTests
    archive:
      config: Release
